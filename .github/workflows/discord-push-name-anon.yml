# act-only: name-anon-users scenario (branch never pushed in CI)
name: Discord Push Notification (act name-anon)

on:
  push:
    branches: [__act_only_name_anon__]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord
        uses: ./
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          thread-id: ${{ vars.DISCORD_THREAD_ID }}
          name-anon-users: ChatDisabled,WhereiamL
