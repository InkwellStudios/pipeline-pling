# act-only: accent color + webhook identity overrides (branch never pushed in CI)
name: Discord Push Notification (act custom)

on:
  push:
    branches: [__act_only_custom__]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord
        uses: ./
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          thread-id: ${{ vars.DISCORD_THREAD_ID }}
          accent-color: '#E74C3C'
          use-sender-avatar: 'false'
          use-repo-username: 'false'
